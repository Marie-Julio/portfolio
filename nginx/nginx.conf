server {
    listen 80;
    server_name localhost;          # Traefik fait le routage, le nom n'a pas d'importance
    root /usr/share/nginx/html;
    index index.html;

    # Gestion des SPA : renvoyer index.html pour toutes les routes non-fichiers
    location / {
        try_files $uri $uri/ /index.html;
    }

    # (Optionnel) Cacher les fichiers statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}