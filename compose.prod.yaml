version: '3.8'

services:
  react-app:
    build:
      context: ./react-app
      dockerfile: Dockerfile
    container_name: react-app
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.react-app.rule=Host(`sous-domaine.votredomaine.com`)"
      - "traefik.http.services.react-app.loadbalancer.server.port=80"
    networks:
      - traefik-public